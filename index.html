<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eversys — Portal de Servicio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;700;900&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#050505;--bg2:#0a0f0a;--card-bg:#070d07;
  --border:#1a2e1a;--border2:#244024;
  --green:#00ff88;--green2:#00cc6a;
  --white:#f0fff4;--text:#b8e8c8;--muted:#4a7a5a;--muted2:#3a5a45;
  --danger:#ff4466;--warn:#ffaa00;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;overflow-x:hidden;}
header{padding:2rem;text-align:center;border-bottom:1px solid var(--border);background:var(--bg2);}
h1{font-family:'Orbitron',sans-serif;color:var(--green);letter-spacing:2px;font-size:1.5rem;}
.container{max-width:800px;margin:2rem auto;padding:0 1rem;}
.form-group{margin-bottom:2rem;display:flex;gap:10px;background:var(--card-bg);padding:1rem;border:1px solid var(--border);border-radius:8px;}
input{background:#111;border:1px solid var(--border2);padding:12px;color:var(--white);flex:1;border-radius:4px;outline:none;}
input:focus{border-color:var(--green);}
button.main-btn{background:var(--green);color:var(--bg);border:none;padding:10px 20px;cursor:pointer;font-weight:bold;border-radius:4px;transition:0.2s;}
button.main-btn:hover{background:var(--green2);transform:scale(1.02);}
.co-card{background:var(--card-bg);border:1px solid var(--border);padding:1.2rem;margin-bottom:1rem;border-radius:8px;display:flex;justify-content:space-between;align-items:center;}
.co-name{font-weight:600;font-size:1.1rem;color:var(--white);}
.co-del-btn{background:rgba(255,68,102,0.1);color:var(--danger);border:1px solid var(--danger);padding:6px 12px;border-radius:4px;cursor:pointer;font-size:0.8rem;}
.co-del-btn:hover{background:var(--danger);color:white;}
.empty-state{text-align:center;padding:3rem;color:var(--muted);border:2px dashed var(--border);border-radius:8px;}
</style>
</head>
<body>

<header>
  <h1>EVERSYS PORTAL</h1>
  <p style="font-size:0.8rem; color:var(--muted); margin-top:5px;">VERSIÓN GITHUB PAGES (LOCAL STORAGE)</p>
</header>

<div class="container">
  <div class="form-group">
    <input type="text" id="newCoName" placeholder="Nombre de la nueva empresa...">
    <button class="main-btn" onclick="handleAddCompany()">+ Crear</button>
  </div>
  <div id="companiesList"></div>
</div>

<script>
// --- LÓGICA DE PERSISTENCIA EN NAVEGADOR (Sustituye a server.js) ---
const STORAGE_KEY = 'eversys_v1_data';

function readData() {
  const saved = localStorage.getItem(STORAGE_KEY);
  return saved ? JSON.parse(saved) : {};
}

function writeData(data) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  render();
}

// Mimic de las funciones originales pero hacia LocalStorage
const getCompanies = () => readData();

const addCompany = (name) => {
  const data = readData();
  const trimmed = name.trim();
  if (!trimmed) return { error: 'Nombre obligatorio' };
  if (data[trimmed]) return { error: 'La empresa ya existe' };
  data[trimmed] = {};
  writeData(data);
  return { ok: true };
};

const delCompany = (name) => {
  const data = readData();
  if (data[name]) {
    delete data[name];
    writeData(data);
  }
  return { ok: true };
};

// --- INTERFAZ ---
function handleAddCompany() {
  const input = document.getElementById('newCoName');
  const res = addCompany(input.value);
  if (res.error) alert(res.error);
  else input.value = '';
}

function deleteCompany(name) {
  if (confirm(`¿Estás seguro de eliminar "${name}"?`)) {
    delCompany(name);
  }
}

function render() {
  const companies = getCompanies();
  const list = document.getElementById('companiesList');
  const keys = Object.keys(companies);
  
  if (keys.length === 0) {
    list.innerHTML = '<div class="empty-state">No hay empresas registradas todavía.</div>';
    return;
  }

  list.innerHTML = keys.map(name => `
    <div class="co-card">
      <span class="co-name">🏢 ${name}</span>
      <button class="co-del-btn" onclick="deleteCompany('${name.replace(/'/g, "\\'")}')">Eliminar</button>
    </div>
  `).join('');
}

// Inicializar
render();
</script>
</body>
</html>
